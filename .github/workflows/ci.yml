name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tasks-guard:
    name: src/ changes require TASKS.md update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check TASKS.md updated alongside src/
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
            # First push to a branch has a zero SHA; fall back to parent commit.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD^ 2>/dev/null || git hash-object -t tree /dev/null)
            fi
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          if echo "$CHANGED" | grep -q '^src/' && ! echo "$CHANGED" | grep -q '^\.agent/tasks/TASKS\.md$'; then
            echo "::error::src/ changed without updating .agent/tasks/TASKS.md (CLAUDE.md core rule 2)"
            exit 1
          fi
          echo "Tasks guard passed."

  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
